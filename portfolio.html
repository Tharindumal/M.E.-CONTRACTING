      color: #fff;

    .container {

    }
    h2 {

      margin-bottom: 1rem;
      color: #fff;
    }

    .btn-primary {
      display: inline-block;
      background: #D4AF37;
      color: #353738;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 40px;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #E8C45A;
      transform: translateY(-2px);
    }
    .btn-outline-small {
      background: transparent;
      border: 1px solid #D4AF37;
      color: #D4AF37;
      padding: 6px 16px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.3s;
      display: inline-block;
    }
    .btn-outline-small:hover {
      background: #D4AF37;
      color: #353738;
    }

      left: 0;
      width: 100%;
      padding: 24px 0;
      z-index: 1000;
      transition: all 0.4s;
      background: transparent;
    }
    .navbar.scrolled {
      background: rgba(53, 55, 56, 0.98);

      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;

      margin: 0 auto;
      padding: 0 32px;
    }

      display: flex;
      align-items: baseline;
      gap: 4px;

    }

      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 2px;
      margin-left: 4px;

    .nav-links {
      display: flex;
      gap: 42px;
      list-style: none;
      align-items: center;
    }
    .nav-links a {

      font-weight: 500;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #D4AF37;
    }
    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: #353738;
      border-radius: 12px;
      padding: 12px 0;
      min-width: 200px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: 0.3s;
      border: 1px solid rgba(212, 175, 55, 0.3);
      z-index: 1000;
    }
    .nav-links > li {
      position: relative;
    }
    .nav-links > li:hover .dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .dropdown-menu a {
      display: block;
      padding: 10px 24px;
      color: #fff !important;
      font-size: 0.85rem;
    }
    .dropdown-menu a:hover {
      background: rgba(212, 175, 55, 0.1);
      color: #D4AF37 !important;
    }
    .nav-contact {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .nav-phone {
      text-decoration: none;
      font-weight: 500;
      color: #fff;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

      color: #D4AF37;
    }

      text-decoration: none;

      border: 1px solid rgba(212, 175, 55, 0.3);
      cursor: pointer;
      transition: 0.2s;

      color: #353738;
      border: none;
    }
    .btn-nav:hover {
      background: #D4AF37;

      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      padding: 8px 12px;
      cursor: pointer;

      font-size: 1.2rem;
      color: #fff;

    }

      right: 24px;
      background: none;
      border: none;

      cursor: pointer;

      color: #fff;

      display: flex;
      flex-direction: column;

      color: #353738;
      text-align: center;
      padding: 12px;

      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px;
      overflow: hidden;

      position: absolute;
      top: 0;
      left: 0;

      height: 100%;

      background-position: center;
      background-repeat: no-repeat;

      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(53, 55, 56, 0.65);

      color: #353738;

    .portfolio-grid-section {
      padding: 80px 0;
      background: #353738;
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 32px;
    }
    .portfolio-item {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      transition: all 0.4s;
      opacity: 0;
      transform: translateY(30px);
      cursor: pointer;
    }
    .portfolio-item.animate-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .portfolio-item:hover {
      transform: translateY(-8px);
      border-color: rgba(212, 175, 55, 0.6);
    }
    .portfolio-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: transform 0.5s;
      display: block;
    }
    .portfolio-item:hover img {
      transform: scale(1.03);
    }
    .portfolio-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(53, 55, 56, 0.95), transparent);
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.4s;
    }
    .portfolio-item:hover .portfolio-overlay {
      transform: translateY(0);
    }
    .portfolio-overlay h3 {
      font-size: 1.2rem;
      margin-bottom: 6px;
      color: #fff;
    }
    .portfolio-overlay p {
      font-size: 0.8rem;
      margin-bottom: 12px;
      color: #A0A0A5;
    }

      color: #666670;

      .container, .nav-container { padding: 0 20px; }

      .menu-toggle { display: flex; }
      .nav-links, .nav-contact { display: none; }
      .portfolio-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .page-hero h1 { font-size: 2rem; }
      .portfolio-item img { height: 240px; }

  // Show full folder gallery - BIG WINDOW, NO HORIZONTAL SCROLL (grid layout)
  function showProjectGallery(projectIdx) {
    const proj = projects[projectIdx];
    if (!proj) return;
    const folder = proj.folder;
    let images = folderImages[folder] || [];
    if (images.length === 0) { alert("No additional images for this project."); return; }

    // Create responsive grid layout (no horizontal scroll)
    let gridHtml = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:16px;">';
    for (let img of images) {
      let fullUrl = BASE_RAW + folder + "/" + img;
      gridHtml += `
        <div style="overflow:hidden; border-radius:16px; border:1px solid rgba(212,175,55,0.3);">
          <img src="${fullUrl}" style="width:100%; height:200px; object-fit:cover; display:block;" loading="lazy">
        </div>
      `;
    }
    gridHtml += '</div>';

    // Create BIG modal window
    const modal = document.createElement("div");
    modal.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10001; display:flex; align-items:center; justify-content:center; overflow-y:auto; padding:40px;";
    modal.innerHTML = `
      <div style="background:#353738; border-radius:28px; max-width:95%; width:1200px; max-height:90vh; overflow-y:auto; padding:24px; border:1px solid #D4AF37;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap;">
          <h3 style="color:#D4AF37; font-size:1.5rem;">${proj.name} - Full Gallery</h3>
          <button class="close-modal" style="background:#D4AF37; color:#353738; border:none; font-size:1rem; padding:8px 20px; border-radius:40px; cursor:pointer; font-weight:600;">&times; Close</button>
        </div>
        ${gridHtml}
      </div>
    `;
    document.body.appendChild(modal);
    modal.querySelector(".close-modal").addEventListener("click", () => modal.remove());
    modal.addEventListener("click", (e) => { if (e.target === modal) modal.remove(); });
  }

  // Render portfolio grid
  function renderPortfolio() {
    const grid = document.getElementById("portfolioGrid");
    if (!grid) return;
    grid.innerHTML = "";
    projects.forEach((proj, idx) => {
      const imgUrl = getImageUrl(proj);
      const card = document.createElement("div");
      card.className = "portfolio-item";
      card.setAttribute("data-category", proj.category);
      card.setAttribute("data-project-idx", idx);
      card.innerHTML = `
        <img src="${imgUrl}" alt="${proj.name}" loading="lazy" onerror="this.style.display='none'">
        <div class="portfolio-overlay">
          <h3>${proj.name}</h3>
          <p>${proj.desc}</p>
          <a href="#" class="btn-outline-small view-project" data-idx="${idx}">View Project</a>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Filters
  function initFilters() {
    const btns = document.querySelectorAll(".filter-btn");
    const items = document.querySelectorAll(".portfolio-item");
    btns.forEach(btn => {
      btn.addEventListener("click", () => {
        const filter = btn.dataset.filter;
        btns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        items.forEach(item => {
          if (filter === "all" || item.dataset.category === filter) item.style.display = "block";
          else item.style.display = "none";
        });
      });
    });
  }

  // Scroll animations
  function initScrollAnimations() {
    const items = document.querySelectorAll(".portfolio-item");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          const idx = Array.from(items).indexOf(entry.target);
          const delay = Math.min(idx * 0.07, 0.6);
          entry.target.style.transitionDelay = `${delay}s`;
          entry.target.classList.add("animate-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    items.forEach(el => observer.observe(el));
  }

  // Load header/footer and initialize
  async function loadComponent(name, placeholder) {
    try {
      const res = await fetch(`${name}.html`);
      if (res.ok) document.getElementById(placeholder).innerHTML = await res.text();
    } catch(e) { console.error(e); }
  }

  Promise.all([loadComponent("header","header-placeholder"), loadComponent("footer","footer-placeholder")]).then(() => {
    renderPortfolio();
    initFilters();
    initScrollAnimations();

    document.querySelectorAll(".view-project").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        const idx = btn.dataset.idx;
        if (idx !== undefined) showProjectGallery(parseInt(idx));
      });
    });

    // Navbar scroll, mobile menu, contact modal
    const navbar = document.getElementById("navbar");
    if (navbar) window.addEventListener("scroll", () => navbar.classList.toggle("scrolled", window.scrollY > 50));
    const menuToggle = document.getElementById("menuToggle");
    const mobileMenu = document.getElementById("mobileMenu");
    const closeMenu = document.getElementById("closeMenu");
    if (menuToggle && mobileMenu) {
      menuToggle.addEventListener("click", () => mobileMenu.classList.add("active"));
      if (closeMenu) closeMenu.addEventListener("click", () => mobileMenu.classList.remove("active"));
      document.querySelectorAll(".mobile-menu a, .mobile-btn").forEach(link => link.addEventListener("click", () => mobileMenu.classList.remove("active")));
    }
    const logoLink = document.getElementById("logoLink");
    if (logoLink) logoLink.addEventListener("click", (e) => { e.preventDefault(); window.location.href = "index.html"; });
    function showContactModal() { alert("Thank you! We will contact you within 24 hours."); }
    document.querySelectorAll(".portfolio-cta, .btn-nav, #contactNavBtn, #mobileContactBtn").forEach(btn => btn?.addEventListener("click", (e) => { e.preventDefault(); showContactModal(); }));
  });
</script>
